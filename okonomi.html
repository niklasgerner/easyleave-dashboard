<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyLeave – Økonomi</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #fff;
      color: #2D4A3E;
      font-size: 13px;
    }

    header {
      background: #2D4A3E;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    header span {
      font-size: 11px;
      opacity: 0.7;
    }

    .refresh-bar {
      background: #f0f4f2;
      border-bottom: 1px solid #dce8e3;
      padding: 6px 20px;
      font-size: 11px;
      color: #7A9E7E;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #7A9E7E;
      display: inline-block;
    }

    .kpi-row {
      display: flex;
      gap: 16px;
      padding: 16px 20px 8px;
      flex-wrap: wrap;
    }

    .kpi-card {
      flex: 1;
      min-width: 160px;
      background: #f7faf8;
      border: 1px solid #dce8e3;
      border-radius: 8px;
      padding: 14px 18px;
    }

    .kpi-label {
      font-size: 11px;
      color: #7A9E7E;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .kpi-value {
      font-size: 24px;
      font-weight: 700;
      color: #2D4A3E;
      margin-top: 4px;
    }

    .chart-container {
      padding: 8px 20px 16px;
      position: relative;
      height: 280px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #7A9E7E;
    }

    .error {
      text-align: center;
      padding: 40px;
      color: #c0392b;
    }
  </style>
</head>
<body>

<header>
  <h1>EasyLeave — Økonomi &amp; Vækst</h1>
  <span id="last-updated">Indlæser...</span>
</header>

<div class="refresh-bar">
  <span class="dot"></span>
  <span>Live data fra Azure DevOps · Opdateres hvert 60. minut</span>
</div>

<div id="status" class="loading">Henter økonomidata...</div>

<div id="content" style="display:none">
  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">Live kunder</div>
      <div class="kpi-value" id="kpi-customers">–</div>
    </div>

    <div class="kpi-card">
      <div class="kpi-label">Total ansatte</div>
      <div class="kpi-value" id="kpi-employees">–</div>
    </div>

    <div class="kpi-card">
      <div class="kpi-label">Total ARR år 1</div>
      <div class="kpi-value" id="kpi-arr">–</div>
    </div>
  </div>

  <div class="chart-container">
    <canvas id="growthChart"></canvas>
  </div>
</div>

<script>
  const WIQL = `SELECT [System.Id], [System.Title], [System.State],
    [Custom.AntalAnsatte], [Custom.KPMAr1], [Custom.KPMAr2],
    [Custom.GoLiveDato], [Custom.KontraktStartDato], [Custom.Implementeringsfee]
    FROM WorkItems
    WHERE [System.TeamProject] = 'EasyLeave'
    AND [System.State] = 'Completed'
    ORDER BY [Custom.GoLiveDato] ASC`;

  let chartInstance = null;

  function fmtKr(val) {
    if (val === null || val === undefined || isNaN(val)) return '–';
    return Number(val).toLocaleString('da-DK') + ' kr.';
  }

  function quarterLabel(dateStr) {
    if (!dateStr) return null;
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return null;
    const q = Math.ceil((d.getMonth() + 1) / 3);
    return `${d.getFullYear()} K${q}`;
  }

  async function fetchData() {
    const statusEl = document.getElementById('status');
    const contentEl = document.getElementById('content');

    try {
      const detailsRes = await fetch('./data/okonomi.json');
      if (!detailsRes.ok) throw new Error(`Kunne ikke hente datafilen (${detailsRes.status})`);

      const detailsData = await detailsRes.json();
      const rawItems = detailsData.value || [];

      const items = rawItems.filter(i =>
        i.fields &&
        (i.fields['Custom.GoLiveDato'] || i.fields['Custom.KontraktStartDato'])
      );

      items.sort((a, b) => {
        const da = new Date(a.fields['Custom.KontraktStartDato'] || a.fields['Custom.GoLiveDato'] || 0);
        const db = new Date(b.fields['Custom.KontraktStartDato'] || b.fields['Custom.GoLiveDato'] || 0);
        return da - db;
      });

      let totalArr1 = 0;
      let totalEmployees = 0;

      for (const item of items) {
        const f = item.fields || {};
        const ansatte = Number(f['Custom.AntalAnsatte']) || 0;
        const kpm1 = Number(f['Custom.KPMAr1']) || 0;

        totalEmployees += ansatte;
        totalArr1 += kpm1 * ansatte * 12;
      }

      document.getElementById('kpi-customers').textContent = items.length.toLocaleString('da-DK');
      document.getElementById('kpi-employees').textContent = totalEmployees.toLocaleString('da-DK');
      document.getElementById('kpi-arr').textContent = fmtKr(totalArr1);

      const quarterMap = {};

      for (const item of items) {
        const f = item.fields || {};
        const ql = quarterLabel(f['Custom.KontraktStartDato'] || f['Custom.GoLiveDato']);
        if (!ql) continue;

        const ansatte = Number(f['Custom.AntalAnsatte']) || 0;
        const kpm1 = Number(f['Custom.KPMAr1']) || 0;
        const fee = Number(f['Custom.Implementeringsfee']) || 0;

        if (!quarterMap[ql]) {
          quarterMap[ql] = { arr: 0, fee: 0, emp: 0 };
        }

        quarterMap[ql].arr += kpm1 * ansatte * 12;
        quarterMap[ql].fee += fee;
        quarterMap[ql].emp += ansatte;
      }

      const labels = Object.keys(quarterMap).sort();
      const arrData = [];
      const feeData = [];
      const empData = [];

      let cumA = 0;
      let cumF = 0;
      let cumE = 0;

      for (const lbl of labels) {
        cumA += quarterMap[lbl].arr;
        cumF += quarterMap[lbl].fee;
        cumE += quarterMap[lbl].emp;

        arrData.push(cumA);
        feeData.push(cumF);
        empData.push(cumE);
      }

      if (chartInstance) {
        chartInstance.destroy();
      }

      const ctx = document.getElementById('growthChart').getContext('2d');

      chartInstance = new Chart(ctx, {
        data: {
          labels: labels,
          datasets: [
            {
              type: 'bar',
              label: 'Implementeringsfee (akkumuleret)',
              data: feeData,
              backgroundColor: '#2D4A3E',
              stack: 'revenue',
              order: 2
            },
            {
              type: 'bar',
              label: 'ARR år 1 (akkumuleret)',
              data: arrData,
              backgroundColor: '#7A9E7E',
              stack: 'revenue',
              order: 2
            },
            {
              type: 'line',
              label: 'Ansatte (akkumuleret)',
              data: empData,
              borderColor: '#f0a500',
              backgroundColor: 'transparent',
              borderWidth: 2,
              pointRadius: 4,
              pointBackgroundColor: '#f0a500',
              yAxisID: 'y2',
              order: 1,
              tension: 0.2
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'index',
            intersect: false
          },
          plugins: {
            legend: {
              labels: {
                font: {
                  family: 'Poppins',
                  size: 11
                },
                color: '#2D4A3E'
              }
            },
            tooltip: {
              callbacks: {
                label(context) {
                  if (context.dataset.yAxisID === 'y2') {
                    return `${context.dataset.label}: ${Number(context.raw).toLocaleString('da-DK')} ansatte`;
                  }
                  return `${context.dataset.label}: ${Number(context.raw).toLocaleString('da-DK')} kr.`;
                }
              }
            }
          },
          scales: {
            x: {
              stacked: true,
              grid: {
                display: false
              },
              ticks: {
                font: {
                  family: 'Poppins',
                  size: 10
                },
                color: '#2D4A3E'
              }
            },
            y: {
              stacked: true,
              grid: {
                color: '#eef3f1'
              },
              ticks: {
                font: {
                  family: 'Poppins',
                  size: 10
                },
                color: '#2D4A3E',
                callback: function(value) {
                  return Number(value).toLocaleString('da-DK') + ' kr.';
                }
              }
            },
            y2: {
              position: 'right',
              grid: {
                display: false
              },
              ticks: {
                font: {
                  family: 'Poppins',
                  size: 10
                },
                color: '#f0a500',
                callback: function(value) {
                  return value + ' ans.';
                }
              }
            }
          }
        }
      });

      statusEl.style.display = 'none';
      contentEl.style.display = 'block';
      document.getElementById('last-updated').textContent =
        'Sidst opdateret: ' + new Date().toLocaleTimeString('da-DK');

    } catch (err) {
      statusEl.className = 'error';
      statusEl.textContent = 'Fejl: ' + err.message;
      console.error(err);
    }
  }

  fetchData();
  setInterval(fetchData, 60 * 60 * 1000);
</script>

</body>
</html>
